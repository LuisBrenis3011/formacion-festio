name: CI

on:
  pull_request:
  push:

jobs:
  backend-verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: festio_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d festio_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/festio_ci
      REDIS_URL: redis://127.0.0.1:6379
      SECRET_KEY: ci-secret
      PAYMENT_WEBHOOK_SECRET: ci-webhook-secret
      GEMINI_API_KEY: ci-dummy-key
      APP_NAME: Festio
      DEBUG: "False"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ALLOW_ORIGINS: https://tu-frontend.vercel.app
      CORS_ALLOW_ORIGIN_REGEX: ""
       MERCADOPAGO_ACCESS_TOKEN: ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
      MERCADOPAGO_PUBLIC_KEY: ${{ secrets.MERCADOPAGO_PUBLIC_KEY }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend deps
        run: pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall app scripts

      - name: Smoke import app
        run: python -c "from fastapi.testclient import TestClient; from app.main import app; client = TestClient(app); response = client.get('/'); assert response.status_code == 200"

      - name: Create schema from models
        run: python -c "import app.domain.all_models; from app.database import Base, engine; Base.metadata.create_all(bind=engine)"

      - name: Stamp alembic head
        run: alembic stamp head

      - name: Run demo seed
        run: python scripts/seed_demo.py

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t festio-backend:ci .
